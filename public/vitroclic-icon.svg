<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      .blue-stroke { fill: none; stroke: #009FCE; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
      .grey-stroke { fill: none; stroke: #343F46; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
      .glass-fill { fill: #009FCE; fill-opacity: 0.05; }
      .cursor-fill { fill: #343F46; }
    </style>
  </defs>

  <!-- Grey Back Panel -->
  <path d="M 60 22 L 75 28 L 75 75" class="grey-stroke" />

  <!-- Blue Front Panel -->
  <path d="M 60 48 L 60 15 L 25 30 L 25 80 L 48 70.8" class="glass-fill" stroke="#009FCE" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />

  <!-- Reflections -->
  <path d="M 32 45 L 45 30" class="blue-stroke" />
  <path d="M 34 55 L 47 40" class="blue-stroke" />

  <!-- Clic Sparks -->
  <path d="M 40 55 L 48 55" class="blue-stroke" />
  <path d="M 43 43 L 49 49" class="blue-stroke" />
  <path d="M 55 40 L 55 48" class="blue-stroke" />
  <path d="M 67 43 L 61 49" class="blue-stroke" />
  <path d="M 70 55 L 62 55" class="blue-stroke" />

  <!-- Cursor Arrow -->
  <polygon points="55,55 65,65 60.5,65 64.5,75 60.5,76 56.5,66 50,70" class="cursor-fill" />
</svg>
